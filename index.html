<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teoria dei Nodi</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f1115;
      color: #eaeaea;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      max-width: 600px;
      padding: 40px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    p {
      color: #b0b0b0;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      padding: 12px 24px;
      background: #ffffff;
      color: #000;
      text-decoration: none;
      font-weight: bold;
      border-radius: 6px;
      transition: 0.2s;
    }

    .btn:hover {
      background: #dcdcdc;
    }

    .footer {
      margin-top: 40px;
      font-size: 14px;
      color: #777;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Teoria dei Nodi</h1>
    <p>Struttura fondamentale basata sulle fasi e le sue relazioni.</p>

    <a class="btn" href="Teoria dei Nodi.pdf" target="_blank">Leggi il PDF</a>

    <div class="footer">
      <p>Ultimo aggiornamento: Aprile 2026</p>
    </div>
  </div>
</body>
</html>
